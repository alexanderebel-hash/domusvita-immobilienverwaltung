<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 2cm 2.5cm 2.5cm 2.5cm;
    @bottom-center {
      content: "Seite " counter(page) " von " counter(pages);
      font-size: 9pt;
      color: #666;
    }
  }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #1a1a1a;
  }
  h1 {
    font-size: 18pt;
    color: #0e7490;
    border-bottom: 2px solid #0e7490;
    padding-bottom: 6px;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 14pt;
    color: #0e7490;
    margin-top: 20px;
    margin-bottom: 10px;
  }
  h3 {
    font-size: 12pt;
    color: #334155;
    margin-top: 14px;
    margin-bottom: 8px;
  }
  .header-block {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .header-block .company {
    font-size: 16pt;
    font-weight: bold;
    color: #0e7490;
  }
  .header-block .subtitle {
    font-size: 10pt;
    color: #64748b;
  }
  .info-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
  }
  .info-table td {
    padding: 6px 10px;
    vertical-align: top;
  }
  .info-table .label {
    font-weight: bold;
    color: #475569;
    width: 35%;
  }
  .info-table .value {
    color: #1a1a1a;
  }
  .cost-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
  }
  .cost-table th {
    background: #0e7490;
    color: white;
    padding: 8px 12px;
    text-align: left;
    font-size: 10pt;
  }
  .cost-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #e2e8f0;
  }
  .cost-table tr:nth-child(even) td {
    background: #f8fafc;
  }
  .cost-table .total-row td {
    font-weight: bold;
    background: #f0f9ff;
    border-top: 2px solid #0e7490;
  }
  .cost-table .amount {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .signature-line {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
  }
  .signature-box {
    width: 45%;
  }
  .signature-box .line {
    border-top: 1px solid #1a1a1a;
    margin-top: 60px;
    padding-top: 4px;
    font-size: 9pt;
    color: #64748b;
  }
  .page-break {
    page-break-before: always;
  }
  .section {
    margin-bottom: 20px;
  }
  .highlight-box {
    background: #fef3c7;
    border: 1px solid #fcd34d;
    border-radius: 6px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 10pt;
  }
  .important {
    font-weight: bold;
    color: #dc2626;
  }
  ul, ol {
    padding-left: 20px;
  }
  li {
    margin-bottom: 4px;
  }
  .checkbox-list {
    list-style: none;
    padding-left: 0;
  }
  .checkbox-list li::before {
    content: "\2610 ";
    font-size: 14pt;
    margin-right: 6px;
  }
  .sepa-box {
    border: 2px solid #0e7490;
    border-radius: 8px;
    padding: 20px;
    margin: 16px 0;
  }
  .address-block {
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .date-right {
    text-align: right;
    margin-bottom: 20px;
    color: #64748b;
  }
  p {
    margin-bottom: 8px;
  }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
