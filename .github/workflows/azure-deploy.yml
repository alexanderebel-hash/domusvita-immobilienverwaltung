name: Deploy to Azure

on:
  push:
    branches: [main]

env:
  RESOURCE_GROUP: domusvita-controlling-prod
  ACR_NAME: domusvitacontrollingprodacr
  BACKEND_APP: immo-backend-prod
  FRONTEND_APP: immo-frontend-prod
  BACKEND_URL: https://immo-api.domusvita-portal.de

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Backend
        run: |
          cd backend
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/immo-backend:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/immo-backend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/immo-backend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/immo-backend:latest

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/immo-backend:${{ github.sha }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Frontend
        run: |
          DEPLOY_TS=$(TZ='Europe/Berlin' date '+%d.%m.%Y %H:%M')
          cd frontend
          docker build \
            --build-arg REACT_APP_BACKEND_URL=${{ env.BACKEND_URL }} \
            --build-arg REACT_APP_BUILD_TIMESTAMP="$DEPLOY_TS" \
            -t ${{ env.ACR_NAME }}.azurecr.io/immo-frontend:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/immo-frontend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/immo-frontend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/immo-frontend:latest

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/immo-frontend:${{ github.sha }}

      - name: Verify
        run: |
          sleep 15
          echo "Frontend: https://immobilien.domusvita-portal.de"
          echo "Backend:  https://immo-api.domusvita-portal.de"
